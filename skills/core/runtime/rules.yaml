v: "5.2"
updated: "2026-06-16"
enforcement: required

code:
  never: [dead_code, console_log, ts_any, css_important]
  always: [descriptive_names, explicit_error_handling]

html:
  semantic_elements: [header, main, nav, section, article]
  never_div_for_semantic: true
  img_alt_required: true

css:
  no_hardcoded_tokens: true
  mobile_first: true

design_system:
  check_before_create: true

accessibility:
  standard: WCAG_AA

host_guard: true

front_end:
  server_components_preferred: true
  prevent_inline_callbacks: true
  zustand_selectors: true

back_end:
  edge_validation: true
  sanitize_errors: true
  env_validation: true

architecture:
  solid: true
  cyclic_dependencies_forbidden: true

# Freio automático de loop — protocolo: skills/flows/loop-breaker.md
anti_loop:
  enabled: true
  max_iterations_per_tool: 3        # mesma ferramenta/subagente
  max_seconds_no_progress: 120      # tempo de parede sem entregável observável
  on_detect: stop_switch_or_report  # parar → trocar abordagem → reportar curto
  user_cancel_required: false       # o agente para sozinho; usuário não cancela na mão

