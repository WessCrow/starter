v: "5.1"
updated: "YYYY-MM-DD"

gate:
  rigid: true
  block_feature_done_without_pass: true
  require_sprint_contract: true
  require_user_browser_check_after_pass: true

report:
  language: pt-BR
  tone: simples_direto
  template: templates/qa-report.md
  output_dir: qa/reports

dimensions:
  funciona: { weight: 40, min_score: 7, critical: true, label: "Funciona de verdade" }
  completo: { weight: 25, min_score: 6, critical: true, label: "Contrato entregue" }
  estavel: { weight: 20, pass_type: build_lint_test, critical: true, label: "Build ok" }
  usavel: { weight: 10, min_score: 6, label: "Fácil de usar" }
  visual: { weight: 5, min_score: 5, label: "Visual ok" }

pass_rule: "funciona>=7 AND estavel=pass"

skills:
  gate: qa-gate
  smoke: qa-smoke

smoke_commands:
  nextjs:
    package_manager: [pnpm, npm]
    build: [pnpm run build, npm run build]
    lint: [pnpm run lint, npm run lint]
    test: [pnpm run test, npm run test]
  react_vite:
    package_manager: [pnpm, npm]
    build: [pnpm run build, npm run build]
    lint: [pnpm run lint, npm run lint]
    test: [pnpm run test, npm run test]
