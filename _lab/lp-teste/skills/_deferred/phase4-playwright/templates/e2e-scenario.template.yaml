# Cenário E2E — traduz sprint-contract para Playwright
# Copiar para: qa/e2e-scenario.yaml

v: "1.0"
feature_id: feature-id
required: true

base_url: http://localhost:5173
# Next.js: http://localhost:3000

dev_server:
  command: pnpm run dev
  hint: "Deixe o terminal do dev aberto antes do QA Playwright"

viewports:
  - { name: mobile, width: 375, height: 667 }
  - { name: desktop, width: 1280, height: 720 }

steps:
  - id: 1
    criterion: "Ao abrir a página inicial, vejo o título do app"
    viewport: mobile
    actions:
      - type: navigate
        url: /
      - type: assert_text
        text: "Nome do App"
        mode: visible

  - id: 2
    criterion: "Botão principal responde ao clique"
    viewport: mobile
    actions:
      - type: click
        role: button
        name: "Começar"
      - type: assert_text
        text: "Próxima tela"
        mode: visible

# Tipos de action suportados pelo agente (MCP ou spec gerado):
# navigate | click | type | assert_text | assert_url | screenshot
