v: "5.0"
updated: "YYYY-MM-DD"
enforcement: required

code:
  never: [dead_code, console_log, ts_any, css_important]
  always: [single_responsibility_functions, descriptive_names, explicit_error_handling]

html:
  semantic_elements: [header, main, nav, section, article, footer]
  never_div_for_semantic: true
  img_alt_required: true

css:
  no_hardcoded_tokens: true
  mobile_first: true

design_system:
  check_before_create: true
  source: context.yaml#ds

accessibility:
  standard: WCAG_AA
