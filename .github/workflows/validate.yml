# STARTER — CI mínima (Sprint 002 · P0.1)
# Roda os 3 validadores do framework em todo push/PR.
# Falha se: runtime YAML inválido, skill fantasma no Start.md, ou arquivo privado tracked.
name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pyyaml "jsonschema>=4"

      - name: Runtime — validate.py
        run: python skills/runtime/validate.py

      - name: Skills — validate-skills.py
        run: python skills/scripts/validate-skills.py

      - name: Higiene de repo — check-repo-hygiene.py
        run: python skills/scripts/check-repo-hygiene.py
